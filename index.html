<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:,">
<title>CA Atik Bhayani &amp; Associates — Practice Suite</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --navy:#1a3a5c;--accent:#2563a8;--border:#e2e8f0;
  --bg:#f1f5f9;--text:#0f172a;--muted:#64748b;
  --green:#16a34a;--red:#dc2626;
  --r:8px;--rs:5px;--sh:0 1px 4px rgba(0,0,0,.08);
  --sb-w:220px;--sb-w-collapsed:60px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

.login-wrap{position:fixed;inset:0;background:var(--navy);z-index:10000;display:flex;align-items:center;justify-content:center;}
.login-box{background:#fff;border-radius:12px;padding:36px 32px;width:340px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo-title{font-size:17px;font-weight:700;color:var(--navy);}
.login-logo-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.login-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.login-field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.login-field input{padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;width:100%;}
.login-field input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:var(--accent);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px;}

#app{display:none;height:100vh;flex-direction:column;}
#app.show{display:flex;}
.top-hdr{background:var(--navy);padding:10px 20px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15);display:grid;grid-template-columns:220px 1fr 220px;align-items:center;}
.top-hdr-left{display:flex;align-items:center;gap:10px;}
.top-hdr-left-text{font-size:14px;font-weight:700;color:#fff;}
.top-hdr-center{display:flex;align-items:center;justify-content:center;gap:12px;}
.top-hdr-right{}
.top-hdr-logo-wrap{background:#fff;border-radius:6px;padding:4px 8px;display:flex;align-items:center;flex-shrink:0;}
.top-hdr-logo{height:32px;width:auto;display:block;}
.top-hdr-text{text-align:left;}
.top-hdr-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:.2px;}
.top-hdr-sub{font-size:11.5px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:500;}
.layout{display:flex;flex:1;min-height:0;}

.sidebar{width:var(--sb-w);min-width:var(--sb-w);background:var(--navy);display:flex;flex-direction:column;transition:width .18s,min-width .18s;overflow:hidden;}
.sidebar.collapsed{width:var(--sb-w-collapsed);min-width:var(--sb-w-collapsed);}
.sb-collapse{background:rgba(255,255,255,.1);border:none;color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-collapse:hover{background:rgba(255,255,255,.2);}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 18px;color:rgba(255,255,255,.75);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;border-left:3px solid transparent;}
.sb-item i{font-size:17px;width:18px;text-align:center;flex-shrink:0;}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.sb-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#fff;}
.sb-label{overflow:hidden;text-overflow:ellipsis;}
.sidebar.collapsed .sb-label{display:none;}
.sidebar.collapsed .sb-item{justify-content:center;padding:11px 0;}
.sb-user{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px;}
.sb-av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-uname{color:#fff;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;}
.sb-urole{color:rgba(255,255,255,.55);font-size:10px;}
.sb-logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:15px;flex-shrink:0;}
.sb-logout:hover{color:#fff;}
.sidebar.collapsed .sb-user{justify-content:center;}
.sidebar.collapsed .sb-uname,.sidebar.collapsed .sb-urole,.sidebar.collapsed .sb-logout{display:none;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}

.inner-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;}
.inner-tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;}
.inner-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.inner-panels{flex:1;min-height:0;}
.inner-panel{display:none;height:100%;}
.inner-panel.active{display:block;}

.shell-panel{display:none;flex:1;min-height:0;}
.shell-panel.active{display:flex;flex-direction:column;}
.shell-panel iframe{width:100%;height:100%;border:none;display:block;flex:1;}

.native-wrap{padding:20px;max-width:1200px;margin:0 auto;height:100%;overflow-y:auto;}

.bar{display:flex;align-items:center;gap:8px;padding:0 0 16px;flex-wrap:wrap;}
.sbox{position:relative;flex:1;min-width:160px;max-width:280px;}
.sbox i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.sbox input{width:100%;padding:8px 8px 8px 30px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;outline:none;}
select.sel{padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;outline:none;background:#fff;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .12s;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:#1d4ed8;}
.btn-o{background:#fff;color:var(--text);border:1px solid var(--border);}.btn-o:hover{background:var(--bg);}
.btn-r{background:#fef2f2;color:var(--red);border:1px solid #fca5a5;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#f8fafc;border-bottom:1px solid var(--border);white-space:nowrap;}
tr.row{border-bottom:1px solid var(--border);}
tr.row:last-child{border-bottom:none;}
tr.row:hover{background:#f8fafc;}
tr.row td{padding:9px 12px;vertical-align:middle;font-size:13px;}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.empty{text-align:center;padding:50px;color:var(--muted);}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.25;}
.sp{width:15px;height:15px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.dropzone{border:2px dashed var(--border);border-radius:var(--r);padding:30px;text-align:center;color:var(--muted);margin-bottom:16px;background:#fff;cursor:pointer;}
.dropzone.drag{border-color:var(--accent);background:#eff6ff;}
.dropzone i{font-size:28px;display:block;margin-bottom:8px;opacity:.5;}
h2.sectitle{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--navy);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{background:var(--red);}
.vf-field{margin-bottom:14px;}
.vf-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;}
.vf-field input[type=text]{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;outline:none;}
.vf-field input[type=text]:focus{border-color:var(--accent);}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-title">CA Atik Bhayani &amp; Associates</div>
      <div class="login-logo-sub">Powered by Bhayani Business Solutions</div>
    </div>
    <hr class="login-divider">
    <form onsubmit="doShellLogin();return false;" autocomplete="on">
      <div class="login-field">
        <label>User ID</label>
        <input type="text" id="loginId" placeholder="Enter User ID" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter Password" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
    </form>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="top-hdr">
    <div class="top-hdr-left">
      <button class="sb-collapse" id="sbCollapseBtn" onclick="toggleSidebar()
